# NT-055 — CI serveur : tests + couverture sur chaque push/PR.
name: CI

on:
  push:
    branches: ["dev", "main", "dev-sprint-*"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

jobs:
  tests:
    name: Pytest & coverage
    runs-on: ubuntu-latest
    env:
      # Secret de test uniquement (les vrais secrets vivent dans Render).
      JWT_SECRET_KEY: ci-only-secret-key-not-used-in-production-0000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
