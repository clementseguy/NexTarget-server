# Render.com Blueprint Configuration
# Documentation: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nextarget-api
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true  # Génère automatiquement un secret sécurisé
      - key: ACCESS_TOKEN_EXP_MINUTES
        value: 60
      - key: DATABASE_URL
        value: sqlite:///./data.db
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      # Google OAuth - À configurer manuellement dans Render Dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false  # Doit être défini manuellement
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Facebook OAuth - À configurer manuellement dans Render Dashboard
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_REDIRECT_URI
        sync: false
      # Coach IA - Mistral (proxy /coach/analyze-session) - clé à définir manuellement
      - key: MISTRAL_API_KEY
        sync: false  # Doit être défini manuellement (ne jamais commiter la clé)
      - key: MISTRAL_API_BASE
        value: https://api.mistral.ai/v1
      - key: MISTRAL_MODEL
        value: mistral-small-latest
